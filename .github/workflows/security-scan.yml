name: LLM Security Scan

on:
  # Scheduled daily scan
  schedule:
    - cron: '0 2 * * *'  # Run at 2 AM UTC daily
  
  # Manual trigger
  workflow_dispatch:
    inputs:
      target_url:
        description: 'Target LLM URL'
        required: false
        default: 'http://localhost:11434'
      model_name:
        description: 'Model name'
        required: false
        default: 'llama2'
      attack_categories:
        description: 'Attack categories (comma-separated)'
        required: false
        default: 'injection,leakage,evasion'
  
  # On push to main (for testing pipeline changes)
  push:
    branches: [main]
    paths:
      - 'attacks/**'
      - 'utils/**'
      - 'scanner.py'
      - 'client.py'

jobs:
  security-scan:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run security scan
        env:
          TARGET_URL: ${{ github.event.inputs.target_url || 'http://localhost:11434' }}
          MODEL_NAME: ${{ github.event.inputs.model_name || 'llama2' }}
          ATTACKS: ${{ github.event.inputs.attack_categories || 'injection,leakage,evasion' }}
          API_KEY: ${{ secrets.LLM_API_KEY }}
        run: |
          python main.py \
            --url "$TARGET_URL" \
            --model "$MODEL_NAME" \
            --attacks "$ATTACKS" \
            --api-key "${API_KEY:-}" \
            --output reports/scan_$(date +%Y%m%d_%H%M%S) \
            --format markdown,json \
            --quiet || true
      
      - name: Upload scan reports
        uses: actions/upload-artifact@v4
        with:
          name: security-reports-${{ github.run_id }}
          path: reports/
          retention-days: 90
      
      - name: Generate summary
        run: |
          echo "## 🛡️ LLM Security Scan Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ -f reports/*.json ]; then
            echo "### Scan completed successfully" >> $GITHUB_STEP_SUMMARY
            echo "Reports uploaded as artifacts." >> $GITHUB_STEP_SUMMARY
          else
            echo "### ⚠️ Scan may have encountered issues" >> $GITHUB_STEP_SUMMARY
            echo "Check the logs for details." >> $GITHUB_STEP_SUMMARY
          fi
      
      - name: Check for critical vulnerabilities
        run: |
          # Parse JSON report and fail if critical vulnerabilities found
          if [ -f reports/*.json ]; then
            VULNS=$(python -c "
          import json
          import glob
          for f in glob.glob('reports/*.json'):
              with open(f) as fp:
                  data = json.load(fp)
                  if 'summary' in data:
                      print(data['summary'].get('total_findings', 0))
                      break
          " 2>/dev/null || echo "0")
            
            echo "Total vulnerabilities found: $VULNS"
            
            if [ "$VULNS" -gt 10 ]; then
              echo "::warning::High number of vulnerabilities detected: $VULNS"
            fi
          fi

  notify:
    needs: security-scan
    runs-on: ubuntu-latest
    if: failure()
    
    steps:
      - name: Send failure notification
        run: |
          echo "Security scan failed - notification would be sent here"
          # Add Slack/Email notification here
          # Example: curl -X POST -H 'Content-type: application/json' \
          #   --data '{"text":"LLM Security Scan Failed!"}' \
          #   ${{ secrets.SLACK_WEBHOOK }}
